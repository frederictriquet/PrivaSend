networks:
  web:
    external: false

services:
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.4
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - COLLECTIONS=crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules
      - CUSTOM_HOSTNAME=crowdsec
    ports:
      - '7422:7422' # AppSec Component port
    volumes:
      - ./crowdsec-data/config:/etc/crowdsec
      - ./crowdsec-data/data:/var/lib/crowdsec/data
      - ./traefik-data/logs:/var/log/traefik:ro
      - ./crowdsec-acquis.yaml:/etc/crowdsec/acquis.d/appsec.yaml:ro
    networks:
      - web

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '8080:8080' # API port (temporary for debugging)
    command:
      # API (for debugging)
      - --api.insecure=true
      # Docker provider
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=hostinger-deploy_web
      # File provider for dynamic configuration
      - --providers.file.filename=/etc/traefik/traefik-dynamic.yml
      - --providers.file.watch=true
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Let's Encrypt (must be before HTTP redirect)
      - --certificatesresolvers.letsencrypt.acme.email=frederic.triquet+certificates@gmail.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      # HTTP to HTTPS redirect (after ACME config)
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # CrowdSec Plugin
      - --experimental.plugins.crowdsec.modulename=github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      - --experimental.plugins.crowdsec.version=v1.3.3
      # Access logs for CrowdSec
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-data:/letsencrypt
      - ./traefik-data/logs:/var/log/traefik
      - ./traefik-dynamic.yml:/etc/traefik/traefik-dynamic.yml:ro
    networks:
      - web
    depends_on:
      - crowdsec

  rehearser:
    image: rodgeradr/rehearser
    container_name: rehearser
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    volumes:
      - ./Play:/app/Play:ro
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - web
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
      - 'traefik.enable=true'
      - 'traefik.http.routers.rehearser.rule=Host(`garance.dynv6.net`)'
      - 'traefik.http.routers.rehearser.entrypoints=websecure'
      - 'traefik.http.routers.rehearser.tls=true'
      - 'traefik.http.routers.rehearser.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.rehearser.middlewares=crowdsec@file'
      - 'traefik.http.services.rehearser.loadbalancer.server.port=3000'

  esquisse:
    image: ghcr.io/frederictriquet/esquisse
    container_name: esquisse
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - web
    # healthcheck:
    #   disable: true
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
      - 'traefik.enable=true'
      - 'traefik.http.routers.esquisse.rule=Host(`esquisse.dynv6.net`)'
      - 'traefik.http.routers.esquisse.entrypoints=websecure'
      - 'traefik.http.routers.esquisse.tls=true'
      - 'traefik.http.routers.esquisse.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.esquisse.middlewares=crowdsec@file'
      - 'traefik.http.services.esquisse.loadbalancer.server.port=80'

  privasend:
    image: ghcr.io/frederictriquet/privasend
    container_name: privasend
    expose:
      - '3000'
    volumes:
      - /home/rodger/storage:/app/storage
      - /home/rodger/Torrent:/app/shared:ro
    environment:
      - NODE_ENV=production
      - STORAGE_PATH=/app/storage
      - MAX_FILE_SIZE=5368709120
      - CHUNK_SIZE=5242880
        # SvelteKit body size limit (must be >= CHUNK_SIZE)
      - BODY_SIZE_LIMIT=10485760
      - DEFAULT_EXPIRATION_DAYS=7
      - CLEANUP_INTERVAL_HOURS=1
      - UPLOAD_ENABLED=true
      - SHARED_VOLUME_ENABLED=true
      - SHARED_VOLUME_PATH=/app/shared
      - SHARED_VOLUME_READ_ONLY=true
      - AUTH_ENABLED=true
      - SESSION_TIMEOUT_HOURS=24
      - LOGIN_RATE_LIMIT=3
      - AUDIT_RETENTION_DAYS=90
    env_file:
      - .privasend.env
    restart: unless-stopped
    networks:
      - web
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
      - 'traefik.enable=true'
      - 'traefik.http.routers.privasend.rule=Host(`privasend.dynv6.net`)'
      - 'traefik.http.routers.privasend.entrypoints=websecure'
      - 'traefik.http.routers.privasend.tls=true'
      - 'traefik.http.routers.privasend.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.privasend.middlewares=crowdsec@file'
      - 'traefik.http.services.privasend.loadbalancer.server.port=3000'

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_LABEL_ENABLE=true
    networks:
      - web
